version: '3.8'

services:
  mongo:
    image: mongo:6
    container_name: gatex-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:alpine
    container_name: gatex-redis
    ports:
      - "6379:6379"

  server:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    container_name: gatex-server
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/gatex
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=7d
      - CLIENT_URL=${CLIENT_URL}
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
    depends_on:
      - mongo
      - redis

  client:
    build:
      context: .
      dockerfile: docker/Dockerfile.client
    container_name: gatex-client
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  mongo-data: